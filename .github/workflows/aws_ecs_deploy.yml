name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_CLIENT_REPOSITORY: shopsmart-client
  ECR_SERVER_REPOSITORY: shopsmart-server
  ECS_SERVICE_CLIENT: shopsmart-client-service
  ECS_SERVICE_SERVER: shopsmart-server-service
  ECS_CLUSTER: shopsmart-cluster-v2
  CLIENT_CONTAINER_NAME: client
  SERVER_CONTAINER_NAME: server

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push Client image to Amazon ECR
      id: build-client-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:$IMAGE_TAG ./client
        docker tag $ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_CLIENT_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, and push Server image to Amazon ECR
      id: build-server-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_SERVER_REPOSITORY:$IMAGE_TAG ./server
        docker tag $ECR_REGISTRY/$ECR_SERVER_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_SERVER_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_SERVER_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_SERVER_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_SERVER_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Render Amazon ECS Task Definition for Client
      id: render-client-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: .aws/client-task-def.json
        container-name: ${{ env.CLIENT_CONTAINER_NAME }}
        image: ${{ steps.build-client-image.outputs.image }}

    - name: Render Amazon ECS Task Definition for Server
      id: render-server-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: .aws/server-task-def.json
        container-name: ${{ env.SERVER_CONTAINER_NAME }}
        image: ${{ steps.build-server-image.outputs.image }}

    - name: Deploy Client to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-client-task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_CLIENT }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Deploy Server to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-server-task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_SERVER }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
