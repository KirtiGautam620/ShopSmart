server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy removed to allow ECS deployment without service discovery
    # Frontend should use the backend's Public IP instead.

    # Static files and SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Better error pages
    error_page 404 /index.html;
}
